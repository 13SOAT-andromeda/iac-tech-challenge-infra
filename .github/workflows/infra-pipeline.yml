name: IAC Pipeline

on:
  pull_request:
    branches:
      - develop
      - 'release/*'
      - main
  push:
    branches:
      - main

jobs:
  terraform-ci:
    name: "Terraform CI"
    if: github.event_name == 'pull_request' && (github.base_ref == 'develop' || startsWith(github.base_ref, 'release/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate

  terraform-plan:
    name: "Terraform Plan"
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    defaults:
      run:
        working-directory: aws
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_TF_STATE_BUCKET_NAME: ${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}
      TF_VAR_cluster_role_arn: ${{ secrets.AWS_CLUSTER_ROLE_ARN }}
      TF_VAR_db_password: ${{ secrets.AWS_RDS_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: "Debug: Verify Secrets Presence"
      #   run: |
      #     echo "Verifying presence of environment variables from secrets..."
      #     if [ -n "$AWS_ACCESS_KEY_ID" ]; then echo "AWS_ACCESS_KEY_ID is set"; else echo "AWS_ACCESS_KEY_ID is EMPTY"; fi
      #     if [ -n "$AWS_SECRET_ACCESS_KEY" ]; then echo "AWS_SECRET_ACCESS_KEY is set"; else echo "AWS_SECRET_ACCESS_KEY is EMPTY"; fi
      #     if [ -n "$AWS_REGION" ]; then echo "AWS_REGION is set"; else echo "AWS_REGION is EMPTY"; fi
      #     if [ -n "$AWS_S3_TF_STATE_BUCKET_NAME" ]; then echo "AWS_S3_TF_STATE_BUCKET_NAME is set"; else echo "AWS_S3_TF_STATE_BUCKET_NAME is EMPTY"; fi
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -input=false

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        continue-on-error: true

      - uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style 🖌 \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️ \`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖 \`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan Summary</summary>

            \`\`\`${process.env.PLAN}\`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-apply:
    name: "Terraform Apply"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_TF_STATE_BUCKET_NAME: ${{ secrets.AWS_S3_TF_STATE_BUCKET_NAME }}
      TF_VAR_cluster_role_arn: ${{ secrets.AWS_CLUSTER_ROLE_ARN }}
      TF_VAR_db_password: ${{ secrets.AWS_RDS_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Bootstrap S3 Backend
        run: |
          if ! aws s3 ls "s3://$AWS_S3_TF_STATE_BUCKET_NAME" > /dev/null 2>&1; then
            echo "State Bucket does not exist. Creating..."
            aws s3 mb s3://$AWS_S3_TF_STATE_BUCKET_NAME --region $AWS_REGION
            echo "Waiting for bucket propagation..."
            sleep 15
          else
            echo "State Bucket already exists."
          fi

      - name: Terraform Init
        id: init
        run: |
          if [ -z "$AWS_S3_TF_STATE_BUCKET_NAME" ]; then
            echo "ERROR: AWS_S3_TF_STATE_BUCKET_NAME is empty. Check your GitHub Secrets."
            exit 1
          fi
          terraform init -input=false -reconfigure -backend-config="bucket=$AWS_S3_TF_STATE_BUCKET_NAME"

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false
