kind: "DatadogAgent"
apiVersion: "datadoghq.com/v2alpha1"
metadata:
  name: "datadog"
spec:
  global:
    clusterName: "tech-challenge-local"
    site: "us5.datadoghq.com"
    tags:
      - "env:local"
  override:
    nodeAgent:
      env:
        - name: DD_HOSTNAME
          value: tech-challenge-local
        - name: DD_KUBELET_TLS_VERIFY
          value: "false"
      extraConfd:
        configDataMap:
          http_check.yaml: |
            init_config:

            instances: []
