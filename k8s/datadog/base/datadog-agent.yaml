kind: "DatadogAgent"
apiVersion: "datadoghq.com/v2alpha1"
metadata:
  name: "datadog"
spec:
  global:
    clusterName: "CLUSTER_NAME_PLACEHOLDER"
    site: "SITE_PLACEHOLDER"
    credentials:
      apiSecret:
        secretName: "datadog-secret"
        keyName: "api-key"
    tags:
      - "env:ENV_PLACEHOLDER"
  features:
    clusterChecks:
      enabled: true
    orchestratorExplorer:
      enabled: true
    apm:
      enabled: true
      hostPortConfig:
        enabled: true
        hostPort: 8126
      instrumentation:
        enabled: true
        targets:
          - name: "default-target"
            ddTraceVersions:
              java: "1"
              python: "4"
              js: "5"
              php: "1"
              dotnet: "3"
              ruby: "2"
            ddTraceConfigs:
              - name: "DD_PROFILING_ENABLED"
                value: "auto"
    logCollection:
      enabled: true
      containerCollectAll: true
    asm:
      threats:
        enabled: true
      sca:
        enabled: true
      iast:
        enabled: true
    usm:
      enabled: true
    dogstatsd:
      hostPortConfig:
        enabled: true
  override:
    nodeAgent:
      extraConfd:
        configDataMap:
          http_check.yaml: |
            init_config:

            instances:
              - name: CLUSTER_NAME_PLACEHOLDER-api-health
                url: http://HEALTH_ENDPOINT_PLACEHOLDER/health
                timeout: 5
